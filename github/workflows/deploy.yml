name: Generate Config

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3

      - name: Create config.js from secrets
        run: |
          echo "/*" > config.js
          echo "MAINUL-X Portfolio - Auto-generated Config" >> config.js
          echo "Author: Md. Mainul Islam" >> config.js
          echo "*/" >> config.js
          echo "" >> config.js
          echo "const CONFIG = {" >> config.js
          echo "  GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'," >> config.js
          echo "  TELEGRAM_TOKEN: '${{ secrets.TELEGRAM_TOKEN }}'," >> config.js
          echo "  GITHUB_USERNAME: 'M41NUL'," >> config.js
          echo "  MAX_MEMORY: 10," >> config.js
          echo "  TYPING_SPEED: 15," >> config.js
          echo "  VOICE_LANG: 'bn-BD'," >> config.js
          echo "  WHATSAPP: '01308850528'," >> config.js
          echo "  BKASH: '01308850528'," >> config.js
          echo "  NAGAD: '01308850528'," >> config.js
          echo "  BANK_ACCOUNT: '1073831440001'" >> config.js
          echo "};" >> config.js
          echo "" >> config.js
          echo "console.log('✅ Config loaded from GitHub Actions');" >> config.js
          echo "" >> config.js
          echo "if (typeof module !== 'undefined' && module.exports) {" >> config.js
          echo "  module.exports = CONFIG;" >> config.js
          echo "}" >> config.js

      - name: Commit and push config.js
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add config.js
          git commit -m "Auto-update config.js [skip ci]" || exit 0
          git push
